document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rm: scale(1) rotate(-12deg); } }\n  @keyframes sp-fly { 0% { opacity: 1; transform: translate(0,0) scale(1); } 100% { opacity: 0; transform: translate(var(--fx), var(--fy)) scale(.15); } }\n  @keyframes sp-sheet { from { transform: translateY(100%); } to { transform: translateY(0); } }\n  @keyframes sp-fade { from { opacity: 0; } to { opacity: 1; } }\n  @media (prefers-reduced-motion: reduce) { * { animation-duration: .01ms !important; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 28px 16px; background: radial-gradient(120% 120% at 50% 0%, #EFE6D6 0%, #E1D4C0 100%);\">\n<div style=\"position: relative; width: 390px; height: 844px; background: {{ t.canvas }}; border-radius: 44px; overflow: hidden; box-shadow: 0 30px 70px -20px rgba(42,36,32,.4), 0 0 0 1px rgba(42,36,32,.06);\">\n\n  <!-- ================= HOME / DISCOVERY ================= -->\n  <sc-if value=\"{{ showHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; background: #FAF4EC;\">\n    <div style=\"padding: 62px 22px 12px;\">\n      <div style=\"display: flex; align-items: flex-end; justify-content: space-between;\">\n        <div>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; color: #FF6A4D; font-weight: 700;\">SPOTTED<\u002Fdiv>\n          <div style=\"font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; color: #2A2420; line-height: 1.05; margin-top: 3px;\">Where to<br>next?<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width: 44px; height: 44px; border-radius: 50%; background: #FFF; border: 1px solid #EDE4D8; display: flex; align-items: center; justify-content: center; color: #2A2420;\">\n          <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"scroll\" style=\"display: flex; gap: 8px; overflow-x: auto; padding: 12px 22px 6px;\">\n      <sc-for list=\"{{ vibes }}\" as=\"v\" hint-placeholder-count=\"5\">\n        <button sc-camel-on-click=\"{{ v.onTap }}\" style=\"flex: 0 0 auto; padding: 9px 15px; border-radius: 999px; border: 1px solid {{ v.border }}; background: {{ v.bg }}; color: {{ v.fg }}; font-family: 'Manrope'; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px;\">{{ v.emoji }} {{ v.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div class=\"scroll\" style=\"flex: 1; overflow-y: auto; padding: 8px 18px 96px;\">\n      <div style=\"font-family: 'Manrope'; font-weight: 700; font-size: 13px; color: #8A8078; letter-spacing: .3px; margin: 8px 4px 12px; display: flex; align-items: center; gap: 8px;\">\n        <span style=\"width: 7px; height: 7px; border-radius: 50%; background: #FF6A4D; animation: sp-pulse 1.8s infinite;\"><\u002Fspan> LIVE NOW\n      <\u002Fdiv>\n      <sc-for list=\"{{ feed }}\" as=\"trip\" hint-placeholder-count=\"4\">\n        <div sc-camel-on-click=\"{{ trip.onOpen }}\" style=\"cursor: pointer; margin-bottom: 18px; animation: sp-bounce-in .5s both;\">\n          <!-- boarding pass card -->\n          <div style=\"background: #FFF; border-radius: 22px; border: 1px solid #EDE4D8; box-shadow: 0 10px 24px -16px rgba(42,36,32,.5); overflow: hidden;\">\n            <div style=\"height: 148px; position: relative; background: {{ trip.cover }};\">\n              <div style=\"position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,.42) 100%);\"><\u002Fdiv>\n              <sc-if value=\"{{ trip.live }}\">\n                <div style=\"position: absolute; top: 12px; left: 12px; display: flex; align-items: center; gap: 6px; background: ;\"><\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 390, &quot;height&quot;: 844}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'home',\n    dark: false,\n    coverH: 300,\n    followMaya: false,\n    mayaConfetti: false,\n    reacted: {},        // id -> emoji chosen\n    reactBump: {},      // id-emoji -> true (animate)\n    saved: {},          // attraction id -> true\n    savingId: null,\n    flyGhost: null,\n    composer: null,     // null | 'pick' | 'form'\n  };\n\n  themes = {\n    light: { canvas:'#FAF4EC', surface:'#FFFFFF', ink:'#2A2420', muted:'#8A8078', hairline:'#EDE4D8', sub:'#FBF6EE', navBg:'#FAF4EC' },\n    dark:  { canvas:'#1E1A17', surface:'#2A2420', ink:'#F5EEE4', muted:'#A89C90', hairline:'#3A332D', sub:'#241F1B', navBg:'#1E1A17' },\n  };\n\n  go(screen) { this.setState({ screen, composer: null }); }\n\n  toggleDark() { this.setState(s => ({ dark: !s.dark })); }\n\n  onThreadScroll(e) {\n    const y = e.target.scrollTop;\n    const h = Math.max(88, 300 - y);\n    if (h !== this.state.coverH) this.setState({ coverH: h });\n  }\n\n  toggleFollowMaya() {\n    const willFollow = !this.state.followMaya;\n    this.setState({ followMaya: willFollow, mayaConfetti: willFollow });\n    if (willFollow) setTimeout(() => this.setState({ mayaConfetti: false }), 750);\n  }\n\n  react(id, emoji) {\n    const cur = this.state.reacted[id];\n    const reacted = { ...this.state.reacted };\n    if (cur === emoji) delete reacted[id]; else reacted[id] = emoji;\n    const key = id + emoji;\n    this.setState({ reacted, reactBump: { ...this.state.reactBump, [key]: true } });\n    setTimeout(() => this.setState(s => { const b = { ...s.reactBump }; delete b[key]; return { reactBump: b }; }), 400);\n  }\n\n  saveStop(id, img, ev) {\n    if (this.state.saved[id]) return;\n    // fly ghost from button toward passport tab (bottom-right area)\n    let x = 200, y = 400;\n    try { const r = ev.currentTarget.getBoundingClientRect(); const host = ev.currentTarget.closest('[style*=\"border-radius: 44px\"]') || document.body; const hr = host.getBoundingClientRect(); x = r.left - hr.left; y = r.top - hr.top; } catch(e){}\n    const fx = (320 - x) + 'px';\n    const fy = (786 - y) + 'px';\n    this.setState({ flyGhost: { x, y, img, fx, fy }, savingId: id });\n    setTimeout(() => {\n      this.setState(s => ({ saved: { ...s.saved, [id]: true }, flyGhost: null }));\n    }, 560);\n    setTimeout(() => this.setState({ savingId: null }), 1100);\n  }\n\n  openComposer() { this.setState({ composer: 'pick' }); }\n  closeComposer() { this.setState({ composer: null }); }\n\n  renderVals() {\n    const t = this.state.dark ? this.themes.dark : this.themes.light;\n    const C = { coral:'#FF6A4D', teal:'#0F7B6C', amber:'#FFC24B' };\n    const screen = this.state.screen;\n\n    // placeholder image tones\n    const IMG = {\n      lane:'linear-gradient(135deg,#C9A883,#E3C39C)',\n      temple:'linear-gradient(135deg,#E0B15C,#F0CE8A)',\n      food:'linear-gradient(135deg,#D98763,#E9A985)',\n      market:'linear-gradient(135deg,#7FA99B,#A9C7BC)',\n      scarf:'linear-gradient(135deg,#C86A55,#E29A7E)',\n      soi:'linear-gradient(135deg,#D98A3D,#EBB56B)',\n      mountain:'linear-gradient(135deg,#6E9488,#9DBCB0)',\n      songthaew:'linear-gradient(135deg,#B24B3B,#D57A5F)',\n    };\n\n    // ---- vibe chips ----\n    const vibeDefs = [['🏖️','Beaches'],['🍜','Food'],['🏔️','Hikes'],['🏛️','Cities'],['💸','Budget'],['✨','Luxury']];\n    const vibes = vibeDefs.map((v,i) => ({\n      emoji: v[0], label: v[1],\n      bg: i===1 ? '#FF6A4D' : '#FFF', fg: i===1 ? '#FFF' : '#2A2420',\n      border: i===1 ? '#FF6A4D' : '#EDE4D8',\n      onTap: () => {},\n    }));\n\n    // ---- feed ----\n    const feedDefs = [\n      { title:'Thailand 2026', code:'CNX · 16 DAYS', creator:'Maya Chen', dates:'Feb 8 – 24, 2026', cover:IMG.temple, avatar:' G.songthaew, duration:'0:42', text:'Red truck ride to lunch — turn the sound on for the engine.', reactions: mkReactions('u6',[15,6,3]) },\n        { id:'u7', isPurchase:true, canReact:true, node:C.teal, time:'1:05 PM', img:IMG.soi, item:'Khao soi + Thai iced tea', place:'Khao Soi Khun Yai', amount:'฿55', reactions: mkReactions('u7',[33,22,11]) },\n        { id:'u8', isNote:true, canReact:true, node:C.coral, time:'7:48 PM', text:'Ended the day at the night bazaar with sticky rice and mango. Sunburnt, over-fed, completely happy. Day 4 is Doi Suthep at sunrise — setting a 5am alarm and immediately regretting it.', reactions: mkReactions('u8',[19,8,4]) },\n      ]},\n      { label: 'DAY 4 · DOI SUTHEP', items: [\n        { id:'u9', isAttraction:true, canReact:true, node:C.amber, time:'6:30 AM', img:IMG.mountain, item:'Wat Phra That Doi Suthep', place:'Doi Suthep', amount:'฿30', save: mkSave('u9','Doi Suthep','Chiang Mai','linear-gradient(135deg,#6E9488,#9DBCB0)','฿30'), reactions: mkReactions('u9',[52,24,13]) },\n      ]},\n    ];\n\n    // flatten save fields onto each attraction item so template can read u.saveLabel etc.\n    days.forEach(d => d.items.forEach(u => { if (u.save) Object.assign(u, u.save); }));\n\n    // ---- saved stops (from passport) ----\n    const savedMetaSources = {};\n    days.forEach(d => d.items.forEach(u => { if (u.save) savedMetaSources[u.id] = u.save._meta; }));\n    const savedStops = Object.keys(this.state.saved).filter(k=>this.state.saved[k]).map(k => {\n      const m = savedMetaSources[k] || { name:'Saved stop', place:'Thailand', img:IMG.temple, fee:'฿0' };\n      return { name:m.name, place:m.place, img:m.img, fee:m.fee };\n    });\n    const savedCount = savedStops.length;\n\n    // ---- stamps ----\n    const stampDefs = [\n      { emoji:'🛕', label:'THAILAND', date:\"FEB '26\", color:'#FFC24B', rot:-6, unlocked:true },\n      { emoji:'🍜', label:'VIETNAM', date:\"OCT '25\", color:'#FF6A4D', rot:4, unlocked:true },\n      { emoji:'🌴', label:'BALI', date:\"MAY '25\", color:'#5FB3A3', rot:-3, unlocked:true },\n      { emoji:'🏔️', label:'PATAGONIA', date:'LOCKED', color:'rgba(253,247,236,.25)', rot:5, unlocked:false },\n      { emoji:'🏯', label:'KYOTO', date:'LOCKED', color:'rgba(253,247,236,.25)', rot:-4, unlocked:false },\n      { emoji:'🗺️', label:'NEXT?', date:'LOCKED', color:'rgba(253,247,236,.25)', rot:3, unlocked:false },\n    ];\n    const stamps = stampDefs.map(s => ({ ...s, opacity: s.unlocked ? 1 : .4 }));\n    const stampCount = stampDefs.filter(s=>s.unlocked).length;\n\n    // ---- follow button visual ----\n    const followMaya = this.state.followMaya\n      ? { label:'Following ✓', bg:'#DDF0EC', fg:'#0F7B6C', shadow:'none' }\n      : { label:'Follow along', bg:'#FF6A4D', fg:'#FFF', shadow:'0 8px 18px -8px rgba(255,106,77,.7)' };\n\n    const confetti = [];\n    if (this.state.mayaConfetti) {\n      const cols = ['#FF6A4D','#FFC24B','#0F7B6C','#E29A7E'];\n      for (let i=0;i<10;i++){ const a=(Math.PI*2*i)/10; confetti.push({ color:cols[i%4], dx:(Math.cos(a)*46).toFixed(0)+'px', dy:(Math.sin(a)*46-10).toFixed(0)+'px', dr:(i*40)+'deg' }); }\n    }\n\n    // ---- composer ----\n    const ic = (path) => React.createElement('svg', {width:20,height:20,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'}, React.createElement('g',{dangerouslySetInnerHTML:{__html:path}}));\n    const composerTypes = [\n      { label:'Note', bg:'#FFE7E1', fg:'#FF6A4D', icon: ic('<path d=\"M4 4h16v12H8l-4 4z\"/>'), onTap:()=>{} },\n      { label:'Photo', bg:'#FFE7E1', fg:'#FF6A4D', icon: ic('<rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"3\"/><circle cx=\"8.5\" cy=\"8.5\" r=\"1.5\"/><path d=\"M21 15l-5-5L5 21\"/>'), onTap:()=>{} },\n      { label:'Video', bg:'#FFE7E1', fg:'#FF6A4D', icon: ic('<rect x=\"2\" y=\"5\" width=\"14\" height=\"14\" rx=\"3\"/><path d=\"M16 10l6-3v10l-6-3\"/>'), onTap:()=>{} },\n      { label:'Purchase', bg:'#DDF0EC', fg:'#0F7B6C', icon: ic('<path d=\"M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z\"/><path d=\"M3 6h18\"/><path d=\"M16 10a4 4 0 0 1-8 0\"/>'), onTap:()=>this.setState({composer:'form'}) },\n      { label:'Attraction', bg:'#FFF3D6', fg:'#D69A1E', icon: ic('<path d=\"M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z\"/><circle cx=\"12\" cy=\"10\" r=\"2.5\"/>'), onTap:()=>{} },\n      { label:'Check-in', bg:'#FFF3D6', fg:'#D69A1E', icon: ic('<circle cx=\"12\" cy=\"12\" r=\"9\"/><path d=\"M12 7v5l3 2\"/>'), onTap:()=>{} },\n    ];\n\n    // ---- bottom nav ----\n    const navIcon = (path) => React.createElement('svg', {width:24,height:24,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.9,strokeLinecap:'round',strokeLinejoin:'round'}, React.createElement('g',{dangerouslySetInnerHTML:{__html:path}}));\n    const act = C.coral, idle = t.muted;\n    const navLeft = [\n      { label:'Home', icon: navIcon('<path d=\"M3 10.5L12 3l9 7.5\"/><path d=\"M5 9.5V21h14V9.5\"/>'), color: screen==='home'?act:idle, onTap:()=>this.go('home') },\n      { label:'Discover', icon: navIcon('<circle cx=\"11\" cy=\"11\" r=\"7\"/><path d=\"M21 21l-4-4\"/>'), color: screen==='discover'?act:idle, onTap:()=>this.go('home') },\n    ];\n    const navRight = [\n      { label:'Passport', icon: navIcon('<path d=\"M4 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z\"/><circle cx=\"12\" cy=\"10\" r=\"3\"/><path d=\"M9 16h6\"/>'), color: screen==='passport'?act:idle, onTap:()=>this.go('passport'), badge: savedCount>0 ? String(savedCount) : '', anim: this.state.savingId ? 'sp-pop .5s' : 'none' },\n      { label:'Profile', icon: navIcon('<circle cx=\"12\" cy=\"8\" r=\"4\"/><path d=\"M5 21a7 7 0 0 1 14 0\"/>'), color: screen==='profile'?act:idle, onTap:()=>this.go('profile') },\n    ];\n\n    return {\n      t,\n      showHome: screen==='home', showThread: screen==='thread', showProfile: screen==='profile', showPassport: screen==='passport',\n      threadCover: IMG.temple, threadScroll: (el)=>{ this._ts = el; },\n      coverH: this.state.coverH, onThreadScroll: (e)=>this.onThreadScroll(e),\n      goHome: ()=>this.go('home'), goMap: ()=>{}, goBudget: ()=>{},\n      toggleDark: ()=>this.toggleDark(),\n      vibes, feed, profileTrips, days,\n      noteBg: this.state.dark ? 'rgba(255,106,77,.14)' : '#FFF1EC',\n      noteBorder: this.state.dark ? 'rgba(255,106,77,.3)' : '#FBDDD3',\n      followMaya, toggleFollowMaya: ()=>this.toggleFollowMaya(),\n      mayaConfetti: this.state.mayaConfetti, confetti,\n      savedStops, savedCount, stamps, stampCount, noSaved: savedCount===0,\n      showComposer: !!this.state.composer, composerPicking: this.state.composer==='pick', composerForm: this.state.composer==='form',\n      composerTypes, openComposer: ()=>this.openComposer(), closeComposer: ()=>this.closeComposer(),\n      backToPicker: ()=>this.setState({composer:'pick'}),\n      navLeft, navRight,\n      flyGhost: this.state.flyGhost,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
